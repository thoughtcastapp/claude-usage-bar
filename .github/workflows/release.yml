name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist as a git tag)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-version

      - name: Build (release)
        run: swift build -c release

      - name: Assemble .app bundle
        run: ./build.sh

      - name: Verify bundle
        run: |
          test -d ClaudeUsageBar.app/Contents/MacOS
          test -x ClaudeUsageBar.app/Contents/MacOS/ClaudeUsageBar
          /usr/libexec/PlistBuddy -c "Print :LSUIElement" ClaudeUsageBar.app/Contents/Info.plist
          file ClaudeUsageBar.app/Contents/MacOS/ClaudeUsageBar

      - name: Zip the bundle
        run: |
          /usr/bin/ditto -c -k --keepParent ClaudeUsageBar.app ClaudeUsageBar.zip
          ls -lah ClaudeUsageBar.zip

      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF##*/}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upsert GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          NOTES="Auto-built ad-hoc-signed .app bundle for Apple Silicon (arm64).

          Install with the one-liner from the README."

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "$NOTES"
          fi
          gh release upload "$TAG" ClaudeUsageBar.zip --clobber
